name: Frontend CI Pipeline

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validate HTML
  # ─────────────────────────────────────────
  validate-html:
    name: HTML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate all HTML files
        run: |
          find frontend/ -name "*.html" | xargs html-validate

  # ─────────────────────────────────────────
  # JOB 2: Lint CSS
  # ─────────────────────────────────────────
  lint-css:
    name: CSS Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create Stylelint config
        run: |
          echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json

      - name: Lint all CSS files
        run: |
          find frontend/ -name "*.css" | xargs stylelint
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 3: Lint JavaScript
  # ─────────────────────────────────────────
  lint-js:
    name: JavaScript Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install -g eslint @eslint/js

      - name: Create ESLint config
        run: |
          cat > eslint.config.mjs << 'EOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "warn",
                "no-console": "off"
              }
            }
          ];
          EOF

      - name: Lint all JS files
        run: |
          find frontend/ -name "*.js" | xargs eslint
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 4: Check for Broken Links
  # ─────────────────────────────────────────
  check-links:
    name: Broken Link Check
    runs-on: ubuntu-latest
    needs: validate-html
    if: always()             # ← Runs even if validate-html fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lychee (link checker)
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-mail 'frontend/**/*.html'
          fail: false

  # ─────────────────────────────────────────
  # JOB 5: File Size Check
  # ─────────────────────────────────────────
  size-check:
    name: Asset Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for large files in frontend
        run: |
          echo "=== Checking file sizes in frontend/ ==="
          find frontend/ -type f \( -name "*.js" -o -name "*.css" -o -name "*.html" \) \
            -exec du -sh {} \; | sort -h
          find frontend/ -type f -size +500k -exec echo "⚠️  Large file: {}" \;

      - name: Count total frontend files
        run: |
          echo "HTML files: $(find frontend/ -name '*.html' | wc -l)"
          echo "CSS files:  $(find frontend/ -name '*.css' | wc -l)"
          echo "JS files:   $(find frontend/ -name '*.js' | wc -l)"
          echo "Images:     $(find frontend/ -name '*.png' -o -name '*.jpg' -o -name '*.svg' | wc -l)"
