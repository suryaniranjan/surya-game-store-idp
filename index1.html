<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameVault — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js/dist/amazon-cognito-identity.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #2a2a3a;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0f0f5;
      --muted:     #6b6b80;
      --radius:    12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .glow-1 { background: var(--accent);  top: -200px; right: -100px; }
    .glow-2 { background: var(--accent2); bottom: -200px; left: -100px; }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 420px;
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent); }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 8px;
    }
    .btn:hover   { transform: translateY(-1px); opacity: 0.92; }
    .btn:active  { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }
    .msg.error   { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.3); color: #ff6b35; display: block; }
    .msg.success { background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.25); color: var(--accent); display: block; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="card">
    <div class="logo">Game<span>Vault</span></div>
    <div class="tagline">Your digital game collection, secured.</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab"        onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">Sign In →</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- SIGNUP -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--muted);font-size:11px">(8+ chars, upper, lower, number)</span></label>
        <input type="password" id="su-pass" placeholder="••••••••"/>
      </div>
      <button class="btn" id="su-btn" onclick="doSignUp()">Create Account →</button>
      <div class="msg" id="su-msg"></div>
    </div>

    <!-- CONFIRM -->
    <div class="panel" id="panel-confirm">
      <p style="color:var(--muted);font-size:13px;margin-bottom:20px">
        We sent a verification code to your email. Enter it below.
      </p>
      <div class="form-group">
        <label>Verification Code</label>
        <input type="text" id="conf-code" placeholder="123456" onkeydown="if(event.key==='Enter')doConfirm()"/>
      </div>
      <button class="btn" onclick="doConfirm()">Verify →</button>
      <div class="msg" id="conf-msg"></div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = "index.html";

    let pendingEmail = "";

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
      document.getElementById('panel-login').classList.toggle('active',   tab === 'login');
      document.getElementById('panel-signup').classList.toggle('active',  tab === 'signup');
      document.getElementById('panel-confirm').classList.toggle('active', tab === 'confirm');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      const btn   = document.getElementById('login-btn');
      if (!email || !pass) return showMsg('login-msg', 'Please fill in all fields.', 'error');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await signIn(email, pass);
        window.location.href = "index.html";
      } catch(e) {
        showMsg('login-msg', e.message || 'Sign in failed.', 'error');
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    async function doSignUp() {
      const email = document.getElementById('su-email').value.trim();
      const pass  = document.getElementById('su-pass').value;
      const btn   = document.getElementById('su-btn');
      if (!email || !pass) return showMsg('su-msg', 'Please fill in all fields.', 'error');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        await signUp(email, pass);
        pendingEmail = email;
        switchTab('confirm');
      } catch(e) {
        showMsg('su-msg', e.message || 'Sign up failed.', 'error');
        btn.disabled = false; btn.textContent = 'Create Account →';
      }
    }

    async function doConfirm() {
      const code = document.getElementById('conf-code').value.trim();
      if (!code) return showMsg('conf-msg', 'Please enter the code.', 'error');
      try {
        await confirmSignUp(pendingEmail, code);
        showMsg('conf-msg', 'Account verified! Signing you in…', 'success');
        const pass = document.getElementById('su-pass').value;
        await signIn(pendingEmail, pass);
        window.location.href = "index.html";
      } catch(e) {
        showMsg('conf-msg', e.message || 'Verification failed.', 'error');
      }
    }
  </script>
</body>
</html>
