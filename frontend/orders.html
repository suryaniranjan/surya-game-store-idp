<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault — Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <style>
    /* Payment failed badge */
    .order-status.PAYMENT_FAILED {
      background: #fdecea;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }
    .payment-fail-reason {
      font-size: 0.78rem;
      color: #c62828;
      margin-top: 6px;
      padding: 6px 10px;
      background: #fdecea;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Game<span>Vault</span></div>
  <div class="nav-links">
    <!-- <a class="nav-link" data-page="index.html"    href="index.html">🎮 Store</a>
    <a class="nav-link" data-page="cart.html"     href="cart.html">🛒 Cart</a>
    <a class="nav-link" data-page="wishlist.html" href="wishlist.html">❤️ Wishlist</a>
    <a class="nav-link" data-page="orders.html"   href="orders.html">📦 Orders</a>
    <a class="nav-link admin-link" data-page="admin.html" href="admin.html">⚙️ Admin</a> -->
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">📦 My Orders</div>
      <div class="page-sub" id="orders-sub">Loading your orders…</div>
    </div>
  </div>

  <div class="orders-tabs orders-tabs-hidden" id="orders-tabs">
    <button type="button" class="tab-btn active" onclick="switchTab('placed', this)">
      🕐 Active <span class="tab-badge" id="badge-placed">0</span>
    </button>
    <button type="button" class="tab-btn" onclick="switchTab('delivered', this)">
      ✅ Delivered <span class="tab-badge" id="badge-delivered">0</span>
    </button>
    <button type="button" class="tab-btn" onclick="switchTab('history', this)">
      🗂️ History <span class="tab-badge" id="badge-history">0</span>
    </button>
  </div>

  <div id="orders-content"><div class="spinner"></div></div>
</main>

<div class="toast" id="toast"></div>
<script src="common.js"></script>
<script>
const USER_ID = getOrCreateUserId();

async function loadOrders() {
  const c = document.getElementById('orders-content');
  c.innerHTML = '<div class="spinner"></div>';

  const data = await apiFetch(`/orders?user_id=${USER_ID}`);
  if (!data) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Could not load orders.</div></div>`;
    return;
  }

  const orders = (data.orders || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // PAYMENT_FAILED goes into history tab alongside REJECTED/CANCELLED
  const placed    = orders.filter(o => o.status === 'PLACED');
  const delivered = orders.filter(o => o.status === 'DELIVERED');
  const history   = orders.filter(o => ['REJECTED', 'CANCELLED', 'PAYMENT_FAILED'].includes(o.status));

  document.getElementById('badge-placed').textContent    = placed.length;
  document.getElementById('badge-delivered').textContent = delivered.length;
  document.getElementById('badge-history').textContent   = history.length;

  const total = orders.filter(o => o.status !== 'PENDING_PAYMENT').length;
  document.getElementById('orders-sub').textContent = `${total} order${total !== 1 ? 's' : ''} total`;

  const tabsEl = document.getElementById('orders-tabs');
  tabsEl.classList.remove('orders-tabs-hidden');
  tabsEl.style.display = 'flex';

  c.innerHTML = `
    <div class="tab-panel active" id="panel-placed">
      ${renderOrderList(placed, true)}
    </div>
    <div class="tab-panel" id="panel-delivered">
      <div class="history-section-label">✅ Orders delivered to you</div>
      ${renderOrderList(delivered, false)}
    </div>
    <div class="tab-panel" id="panel-history">
      <div class="history-section-label">🗂️ Rejected, Cancelled &amp; Failed Payments</div>
      ${renderOrderList(history, false)}
    </div>`;
}

function renderOrderList(orders, showCancel) {
  if (!orders.length) {
    return `<div class="tab-empty"><div class="tab-empty-icon">📭</div><div class="tab-empty-text">No orders here yet.</div></div>`;
  }
  return `<div class="orders-list">${orders.map(o => renderOrderCard(o, showCancel)).join('')}</div>`;
}

function renderOrderCard(o, showCancel) {
  const items   = o.items || [];
  const total   = parseFloat(o.total || 0);
  const date    = o.created_at ? new Date(o.created_at).toLocaleString() : '—';
  const shortId = (o.order_id || '').slice(0, 8).toUpperCase();
  const status  = o.status || 'PLACED';

  const statusLabel = {
    PLACED:          'Pending',
    DELIVERED:       'Delivered',
    REJECTED:        'Rejected',
    CANCELLED:       'Cancelled',
    PAYMENT_FAILED:  'Payment Failed'
  }[status] || status;

  const cancelBtn = (showCancel && status === 'PLACED')
    ? `<button type="button" class="cancel-order-btn" id="cancel-btn-${o.order_id}"
         onclick="cancelOrder('${o.order_id}','${shortId}',this)">🗑️ Cancel Order</button>`
    : '';

  // Extra info row for payment failed orders
  const payFailRow = status === 'PAYMENT_FAILED'
    ? `<div class="payment-fail-reason">
         💳 ${o.failure_reason || 'Payment was not completed — no charges made. Your cart items are still available.'}
       </div>`
    : '';

  return `
    <div class="order-card" id="order-card-${o.order_id}">
      <div class="order-card-header">
        <div class="order-id">Order <span>#${shortId}</span></div>
        <div class="order-meta">
          <span class="order-date">${date}</span>
          <span class="order-status ${status}">${statusLabel}</span>
        </div>
      </div>
      ${payFailRow}
      <div class="order-items-list">
        ${items.map(i => `
          <div class="order-item-row">
            <span class="order-item-name">${i.title}<span class="order-item-qty"> ×${i.quantity || 1}</span></span>
            <span class="order-item-price">$${(parseFloat(i.price) * (i.quantity || 1)).toFixed(2)}</span>
          </div>`).join('')}
      </div>
      <div class="order-card-footer">
        <div>
          <div class="order-total-label">Order Total</div>
          <div class="order-total-value">$${total.toFixed(2)}</div>
        </div>
        ${cancelBtn}
      </div>
    </div>`;
}

function switchTab(tab, btnEl) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btnEl.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

async function cancelOrder(orderId, shortId, btnEl) {
  if (!confirm(`Cancel order #${shortId}? Stock will be restored.`)) return;
  btnEl.disabled = true;
  btnEl.textContent = 'Cancelling…';
  try {
    const res = await fetch(`${CONFIG.API_URL}/orders/${orderId}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' }
    });
    if (res.ok) {
      toast('🗑️ Order cancelled — stock restored');
      await loadOrders();
    } else {
      const err = await res.json().catch(() => ({}));
      toast(`Failed: ${err.error || res.status}`, 'error');
      btnEl.disabled = false;
      btnEl.textContent = '🗑️ Cancel Order';
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    btnEl.disabled = false;
    btnEl.textContent = '🗑️ Cancel Order';
  }
}

loadOrders();
</script>
</body>
</html>
