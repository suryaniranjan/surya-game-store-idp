<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameVault — Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <div class="nav-logo">Game<span>Vault</span></div>
  <div class="nav-links">
    <a class="nav-link" data-page="index.html"    href="index.html">🎮 Store</a>
    <a class="nav-link" data-page="cart.html"     href="cart.html">🛒 Cart</a>
    <a class="nav-link" data-page="wishlist.html" href="wishlist.html">❤️ Wishlist</a>
    <a class="nav-link" data-page="orders.html"   href="orders.html">📦 Orders</a>
    <a class="nav-link admin-link" data-page="admin.html" href="admin.html">⚙️ Admin</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">All Games</div>
      <div class="page-sub" id="store-sub">Loading catalogue…</div>
    </div>
  </div>

  <!-- ── INLINE SEARCH BAR ── -->
  <div class="search-bar">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" id="search-q" placeholder="Search by title, genre or platform…" onkeydown="if(event.key==='Enter')doSearch()"/>
    <select id="filter-genre"><option value="">All Genres</option></select>
    <select id="filter-platform"><option value="">All Platforms</option></select>
    <select id="filter-rating"><option value="">Any Rating</option></select>
    <button class="search-go" onclick="doSearch()">Search</button>
    <button class="search-go" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);" onclick="clearSearch()">✕</button>
  </div>

  <div id="store-content"><div class="spinner"></div></div>
</main>

<div class="toast" id="toast"></div>
<script src="common.js"></script>
<script>
const USER_ID = getOrCreateUserId();

// ── Filters ───────────────────────────────────────────────────────────────────
async function loadFilters() {
  const data = await apiFetch('/search/filters');
  if (!data) return;
  document.getElementById('filter-genre').innerHTML    = '<option value="">All Genres</option>'    + (data.genres    || []).map(g => `<option>${g}</option>`).join('');
  document.getElementById('filter-platform').innerHTML = '<option value="">All Platforms</option>' + (data.platforms || []).map(p => `<option>${p}</option>`).join('');
  document.getElementById('filter-rating').innerHTML   = '<option value="">Any Rating</option>'    + (data.ratings   || []).map(r => `<option>${r}</option>`).join('');
}

// ── Store loader ──────────────────────────────────────────────────────────────
async function loadStore() {
  const c = document.getElementById('store-content');
  c.innerHTML = '<div class="spinner"></div>';
  const data = await apiFetch('/games');
  if (!data) return;
  document.getElementById('store-sub').textContent = `${data.count || 0} games available`;
  renderGames(data.games || [], c);
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q        = document.getElementById('search-q').value.trim();
  const genre    = document.getElementById('filter-genre').value;
  const platform = document.getElementById('filter-platform').value;
  const rating   = document.getElementById('filter-rating').value;

  if (!q && !genre && !platform && !rating) { loadStore(); return; }

  const c = document.getElementById('store-content');
  c.innerHTML = '<div class="spinner"></div>';
  const params = new URLSearchParams();
  if (q)        params.set('q', q);
  if (genre)    params.set('genre', genre);
  if (platform) params.set('platform', platform);
  if (rating)   params.set('rating', rating);
  const data = await apiFetch('/search?' + params.toString());
  if (!data) return;
  const results = data.results || [];
  document.getElementById('store-sub').textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found`;
  renderGames(results, c);
}

function clearSearch() {
  document.getElementById('search-q').value = '';
  document.getElementById('filter-genre').value = '';
  document.getElementById('filter-platform').value = '';
  document.getElementById('filter-rating').value = '';
  loadStore();
}

// ── LOW STOCK THRESHOLD ───────────────────────────────────────────────────────
const LOW_STOCK_THRESHOLD = 10;

// ── Render game grid ──────────────────────────────────────────────────────────
function renderGames(games, container) {
  if (!games.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🕹️</div><div class="empty-text">No games found.</div></div>';
    return;
  }

  container.innerHTML = '<div class="game-grid">' +
    games.map(g => {
      const stock      = parseInt(g.stock ?? 0);
      const outOfStock = stock === 0;
      const lowStock   = !outOfStock && stock <= LOW_STOCK_THRESHOLD;

      // Out-of-stock overlay on image
      const imageHTML = outOfStock
        ? `<div class="game-img-wrap">
             ${g.image_url
               ? `<img src="${g.image_url}" alt="${g.title}" onerror="this.parentElement.innerHTML=placeholderHTML()"/>`
               : placeholderHTML()}
             <div class="oos-overlay">
               <span class="oos-label">Out of Stock</span>
             </div>
           </div>`
        : gameImageHTML(g);

      // Low stock badge (only when in stock but low)
      const lowStockBadge = lowStock
        ? `<div class="low-stock-badge">Only ${stock} left!</div>`
        : '';

      // Add to cart button — disabled when out of stock
      const addBtn = outOfStock
        ? `<button class="add-btn oos-btn" disabled>Out of Stock</button>`
        : `<button class="add-btn" onclick='addToCart(${JSON.stringify(g)}, this)'>Add to Cart</button>`;

      // ── Wishlist heart button ─────────────────────────────────────────────
      const wishlisted = _wishlistIds.has(g.game_id);
      const wishBtn = `<button
          class="wish-btn${wishlisted ? ' wishlisted' : ''}"
          data-game-id="${g.game_id}"
          title="${wishlisted ? 'Remove from Wishlist' : 'Add to Wishlist'}"
          onclick='toggleWishlist(${JSON.stringify(g)}, "${USER_ID}")'>
          ${wishlisted ? '♥' : '♡'}
        </button>`;

      return `
        <div class="game-card ${outOfStock ? 'card-oos' : ''}">
          ${imageHTML}
          <div class="game-body">
            ${lowStockBadge}
            <div class="game-title">${g.title}</div>
            <div class="game-genre">${g.genre || ''} · ${g.platform || ''}</div>
            <div class="game-footer">
              <div class="game-price ${outOfStock ? 'price-oos' : ''}">$${parseFloat(g.price).toFixed(2)}</div>
              <div class="game-actions">
                ${wishBtn}
                ${addBtn}
              </div>
            </div>
          </div>
        </div>`;
    }).join('') + '</div>';
}

// ── Add to cart ───────────────────────────────────────────────────────────────
async function addToCart(game, btnEl) {
  if (parseInt(game.stock ?? 0) === 0) {
    toast('❌ This item is out of stock', 'error');
    return;
  }

  btnEl.disabled    = true;
  btnEl.textContent = 'Adding…';

  const data = await apiFetch(`/cart/${USER_ID}/items`, {
    method: 'POST',
    body: JSON.stringify({
      game_id:  game.game_id,
      title:    game.title,
      price:    game.price,
      quantity: 1
    })
  });

  if (data) toast(`✅ "${game.title}" added to cart`);
  else      toast('Failed to add to cart', 'error');

  btnEl.disabled    = false;
  btnEl.textContent = 'Add to Cart';
}

// ── Boot: load wishlist IDs first so hearts render correctly ──────────────────
loadWishlistIds(USER_ID).then(() => {
  loadFilters();
  loadStore();
});
</script>
</body>
</html>
